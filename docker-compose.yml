services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB:       vigilant
      POSTGRES_USER:     vigilant
      POSTGRES_PASSWORD: vigilant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vigilant -d vigilant"]
      interval: 5s
      timeout: 5s
      retries: 12

  clickhouse:
    image: clickhouse/clickhouse-server:24
    environment:
      CLICKHOUSE_DB:       vigilant
      CLICKHOUSE_USER:     default
      CLICKHOUSE_PASSWORD: ""
    ports:
      - "9000:9000"   # native (TCP) — used by clickhouse-driver
      - "8123:8123"   # HTTP — useful for ad-hoc queries / dashboards
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 12
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

volumes:
  postgres_data:
  clickhouse_data: